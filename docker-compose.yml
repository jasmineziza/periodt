version: '3.8'

services:

  auth-gateway-service:
    build: ./auth-gateway-service
    container_name: periodt-auth-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./auth-gateway-service:/app
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-only-secret-change-me}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./auth.db}
      - FRONTEND_ORIGINS=${FRONTEND_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - CYCLE_SERVICE_URL=http://cycle-wellness-service:8001
      - ANALYTICS_SERVICE_URL=http://analytics-reminder-service:8002
    networks:
      - periodt-network
    restart: unless-stopped

  cycle-wellness-service:
    build: ./cycle-wellness-service
    container_name: periodt-cycle-wellness
    ports:
      - "8001:8001"
    volumes:
      - ./cycle-wellness-service:/app
    networks:
      - periodt-network
    restart: unless-stopped

  analytics-reminder-service:
    build: ./analytics-reminder-service
    container_name: periodt-analytics-reminder
    ports:
      - "8002:8002"
    volumes:
      - ./analytics-reminder-service:/app
    networks:
      - periodt-network
    restart: unless-stopped

  periodt-frontend:
    build: ./periodt-frontend
    container_name: periodt-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./periodt-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    networks:
      - periodt-network
    restart: unless-stopped

networks:
  periodt-network:
    driver: bridge
